<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 0, 255, 0.2), transparent 70%);
            animation: pulse 6s infinite ease-in-out;
        }

        .glow:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .glow:nth-child(2) { bottom: 10%; right: 20%; animation-delay: 3s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        h1 {
            font-size: 3.5em;
            color: #0d47a1;
            text-shadow: 0px 0px 25px rgba(13, 71, 161, 0.8);
            margin-bottom: 10px;
        }

        h3 {
            font-weight: 300;
            color: #ccc;
            font-size: 1.4em;
        }

        footer {
            position: absolute;
            bottom: 20px;
            color: #555;
            font-size: 0.9em;
        }

        /* Fade Animation for Exit */
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>

    <script>
        // Auto redirect after 5 seconds
        setTimeout(() => {
            document.body.style.animation = "fadeOut 2s forwards";
            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 2000);
        }, 5000);
    </script>
</head>
<body>
    <div class="glow"></div>
    <div class="glow"></div>

    <h1>Health Tracker</h1>
    <h3>Starting from the Core</h3>

    <footer>© 2025 Health Tracker Project | DBMS Showcase</footer>
</body>
</html>
