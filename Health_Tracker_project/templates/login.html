<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Health Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a192f, #112240);
            color: #e6f1ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(17, 34, 64, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #64ffda;
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            background: #1d3557;
            color: #e6f1ff;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 8px #64ffda;
            background: #264a7f;
        }

        button {
            background-color: #64ffda;
            color: #0a192f;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 90%;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #52e0c4;
        }

        p {
            margin-top: 15px;
            color: #a8b2d1;
        }

        a {
            color: #64ffda;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                width: 85%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="{{ url_for('static', filename='jinwoo.jpg') }}" class="logo">
    <h2>Login to Health Tracker</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <input type="number" name="user_id" placeholder="Enter your User ID" required>
        <button type="submit">Login</button>
    </form>

    <p>Don’t have an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>

</body>
</html>
